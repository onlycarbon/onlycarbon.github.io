<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>唯一碳基 · 出厂陈列室</title>
<meta name="description" content="唯一碳基的出厂陈列室。一人公司，全体员工都是 AI，我是这里唯一的人类，这里放着几件亲手盖章、点开就能玩的小东西。">
<meta property="og:title" content="唯一碳基 · 出厂陈列室">
<meta property="og:description" content="一人公司，全体员工都是 AI，我是这里唯一的人类。造点小东西，做完自己用。">
<meta property="og:type" content="website">
<meta property="og:site_name" content="唯一碳基 Only Carbon">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1008 1008'%3E%3Cpath d='M 772 349 L 504 194 L 236 349 L 236 659 L 504 814 L 772 659' fill='none' stroke='%232B2118' stroke-width='100' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='772' cy='349' r='68' fill='%23FF7A45' stroke='%232B2118' stroke-width='18'/%3E%3Ccircle cx='772' cy='659' r='68' fill='%23FF7A45' stroke='%232B2118' stroke-width='18'/%3E%3C/svg%3E">
<style>
  :root{
    --espresso:#2B2118;
    --helmet:#FFC53D;
    --blue:#3F6FA8;
    --orange:#FF7A45;
    --paper:#FFF6E8;
    --card:#FFFDF7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(var(--helmet) 2px, transparent 2px);
    background-size: 28px 28px;
    background-attachment: fixed;
    color:var(--espresso);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
    line-height:1.6;
    padding: 20px 16px 60px;
  }
  a{color:inherit;}
  .wrap{max-width:960px;margin:0 auto;}

  /* ---------- hero ---------- */
  .hero{
    text-align:center;
    padding: 28px 16px 32px;
  }
  .avatar{
    width:112px;height:112px;
    margin:0 auto 14px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid var(--espresso);
    box-shadow:5px 5px 0 var(--espresso);
    background:var(--blue);
  }
  .avatar svg{display:block;width:100%;height:100%;}
  .name{
    font-size:28px;
    margin:0 0 4px;
    font-weight:800;
    letter-spacing:0.5px;
  }
  .name .en{
    display:block;
    font-size:14px;
    font-weight:600;
    color:var(--blue);
    letter-spacing:2px;
    margin-top:2px;
  }
  .handle{
    display:inline-block;
    margin:6px 0 12px;
    font-size:13px;
    font-weight:700;
    color:var(--espresso);
    background:var(--helmet);
    border:2.5px solid var(--espresso);
    border-radius:999px;
    padding:3px 14px;
  }
  .slogan{
    font-size:17px;
    font-weight:800;
    color:var(--orange);
    margin:10px 0 8px;
  }
  .intro{
    max-width:440px;
    margin:0 auto;
    font-size:15px;
    color:#4a3c2c;
  }

  /* ---------- grid ---------- */
  .grid{
    display:grid;
    grid-template-columns: 1fr;
    gap:20px;
    margin-top: 12px;
  }
  @media(min-width:640px){
    .grid{grid-template-columns: 1fr 1fr;}
  }
  @media(min-width:1000px){
    .grid{grid-template-columns: 1fr 1fr 1fr;}
  }

  .card{
    background:var(--card);
    border:3px solid var(--espresso);
    border-radius:26px;
    padding:22px 20px 20px;
    box-shadow:6px 6px 0 var(--espresso);
    display:flex;
    flex-direction:column;
    position:relative;
    transition: transform .15s ease;
  }
  .card:nth-child(3n+1){ --accent: var(--blue); }
  .card:nth-child(3n+2){ --accent: var(--orange); }
  .card:nth-child(3n+3){ --accent: var(--helmet); }
  .card.soon{
    background:transparent;
    border-style:dashed;
    box-shadow:none;
    opacity:.75;
  }

  .card .dot{
    width:14px;height:14px;
    border-radius:50%;
    background:var(--accent, var(--orange));
    border:2px solid var(--espresso);
    margin-bottom:10px;
  }
  .card h2{
    font-size:19px;
    margin:0 0 8px;
    font-weight:800;
  }
  .card p{
    font-size:14.5px;
    color:#4a3c2c;
    margin:0 0 18px;
    flex-grow:1;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    text-decoration:none;
    font-weight:800;
    font-size:15px;
    color:var(--card);
    background:var(--espresso);
    border:2.5px solid var(--espresso);
    border-radius:999px;
    padding:12px 18px;
    box-shadow:3px 3px 0 var(--accent, var(--orange));
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{
    transform: translate(3px,3px);
    box-shadow:0 0 0 var(--accent, var(--orange));
  }

  /* ---------- footer ---------- */
  footer{
    text-align:center;
    margin-top:44px;
    padding-top:22px;
    border-top:2.5px dashed #d8c7a8;
  }
  footer p{
    font-size:14px;
    font-weight:700;
    color:var(--espresso);
    margin:0 0 12px;
  }
  footer .mark{
    width:34px;height:34px;
    margin:0 auto;
    opacity:0.85;
  }
  footer .mark svg{display:block;width:100%;height:100%;}
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <div class="avatar">
      <svg width="1008" height="1008" viewBox="0 0 1008 1008" xmlns="http://www.w3.org/2000/svg">
        <rect width="1008" height="1008" fill="#3F6FA8"/>
        <ellipse cx="504" cy="1046" rx="360" ry="170" fill="#FF7A45" stroke="#2B2118" stroke-width="16"/>
        <circle cx="216" cy="610" r="46" fill="#FFDDB8" stroke="#2B2118" stroke-width="14"/>
        <circle cx="792" cy="610" r="46" fill="#FFDDB8" stroke="#2B2118" stroke-width="14"/>
        <ellipse cx="504" cy="590" rx="285" ry="300" fill="#FFDDB8" stroke="#2B2118" stroke-width="16"/>
        <rect x="462" y="168" width="84" height="110" rx="34" fill="#FFC53D" stroke="#2B2118" stroke-width="14"/>
        <path d="M 230 442 A 274 244 0 0 1 778 442 Z" fill="#FFC53D" stroke="#2B2118" stroke-width="16" stroke-linejoin="round"/>
        <ellipse cx="366" cy="308" rx="66" ry="26" fill="#FFFFFF" opacity="0.5" transform="rotate(-28 366 308)"/>
        <rect x="146" y="424" width="716" height="66" rx="33" fill="#FFC53D" stroke="#2B2118" stroke-width="16"/>
        <circle cx="398" cy="606" r="31" fill="#2B2118"/>
        <circle cx="610" cy="606" r="31" fill="#2B2118"/>
        <circle cx="388" cy="595" r="10" fill="#FFFFFF"/>
        <circle cx="600" cy="595" r="10" fill="#FFFFFF"/>
        <ellipse cx="336" cy="692" rx="44" ry="27" fill="#FFAF87" opacity="0.85"/>
        <ellipse cx="672" cy="692" rx="44" ry="27" fill="#FFAF87" opacity="0.85"/>
        <path d="M 448 722 Q 504 772 560 722" fill="none" stroke="#2B2118" stroke-width="20" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="name">唯一碳基<span class="en">ONLY CARBON</span></h1>
    <div class="handle">@onlycarbon</div>
    <p class="slogan">AI 负责干活，我负责是个人</p>
    <p class="intro">一人公司，全体员工都是 AI，我是这里唯一的人类。造点小东西，做完自己用 👷</p>
  </header>

  <main class="grid">

    <section class="card">
      <div class="dot"></div>
      <h2>vibe-trophy</h2>
      <p>专治 AI 写代码路上的各种社死瞬间，成就系统一样帮你全部解锁出来。拖进去自己的记录，看看你踩过几个坑，骂了几次街。</p>
      <a class="btn" href="/vibe-trophy/" target="_blank" rel="noopener noreferrer">点开就能玩 →</a>
    </section>

    <section class="card soon">
      <div class="dot"></div>
      <h2>下一件在装箱…</h2>
      <p>仓库里还压着好几件，正在挨个擦灰贴牌。上新都会先发小红书，蹲一个。</p>
    </section>

  </main>

  <footer>
    <p>小红书 <strong>@唯一碳基</strong> · 出厂记录连载中</p>
    <div class="mark">
      <svg width="1008" height="1008" viewBox="0 0 1008 1008" xmlns="http://www.w3.org/2000/svg">
        <path d="M 772 349 L 504 194 L 236 349 L 236 659 L 504 814 L 772 659"
              fill="none" stroke="#2B2118" stroke-width="100"
              stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="772" cy="349" r="68" fill="#FF7A45" stroke="#2B2118" stroke-width="18"/>
        <circle cx="772" cy="659" r="68" fill="#FF7A45" stroke="#2B2118" stroke-width="18"/>
      </svg>
    </div>
  </footer>

</div>
</body>
</html>
