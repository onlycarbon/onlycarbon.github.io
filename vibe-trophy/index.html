  },
  en: {

    tag2: 'Other people\'s percentages are made up. Every number here comes straight from your real archive.',
    dropBig: '📂 Drop your ~/.claude folder here', dropMut: 'or click to pick a folder · ~/.codex and ~/.openclaw welcome too',

    stats: ['Joined', 'Sessions', 'Active days', 'Total tokens (incl. cache)', 'Output tokens', 'Tool calls', 'Late nights'],
    srcsLine: (n, parts) => `🧩 <b>${n}</b> platforms connected: ${parts}`, sess: 'sessions',
    tip: 'Click cards to mark them for sharing; share mode shows only marked cards (default: gold & platinum).',
    hiddenName: 'Hidden achievement', hiddenDesc: 'Keep vibing, you will bump into it', lockedTxt: 'Locked', hiddenTag: 'hidden',
    groups: { g1: '🌱 Daily', g2: '🌙 Grind', g3: '💸 Cash Burn', g4: '🎮 Micro-ops' },
    tiers: { t1: 'Bronze', t2: 'Silver', t3: 'Gold', t4: 'Platinum' },
    foot: 'Every number comes from local logs, nothing made up · grind achievements only count moments you actually typed; cron and autonomous agent runs are excluded',
    moreTxt: '…and {n} more', shareHeader: 'My Vibecoding Achievements', fromLogs: 'straight from local logs', sep: ': ',
    faqQ: '📂 Can\'t find ~/.claude? (it\'s a hidden folder)',
    faqA: 'It lives in your home directory. <b>Mac</b>: after the folder picker opens, press <b>Cmd+Shift+.</b> to reveal hidden folders; or in Finder hit Cmd+Shift+G, type ~/.claude, then drag that folder in. <b>Windows</b>: paste %USERPROFILE%\\.claude into the Explorer address bar. Codex lives in ~/.codex, OpenClaw in ~/.openclaw. Dropping several at once is fine.',
  },
};
let LANG = (navigator.language || '').toLowerCase().startsWith('zh') ? 'zh' : 'en';
const L = () => STR[LANG];
function applyStatic() {
  document.documentElement.lang = LANG;
  document.title = LANG === 'zh' ? 'vibe-trophy · 算算你的 vibecoding 成就' : 'vibe-trophy · compute your vibecoding achievements';
  document.querySelectorAll('[data-s]').forEach(el => { const v = L()[el.getAttribute('data-s')]; if (typeof v === 'string') el.innerHTML = v; });
  document.getElementById('langBtn').textContent = LANG === 'zh' ? 'EN' : '中';
  document.getElementById('copyBtn').textContent = L().copyBtn;
  document.getElementById('exportBtn').textContent = L().exportBtn;
  document.getElementById('shareBtn').textContent = L().share;
  document.getElementById('againBtn').textContent = L().again;
}
function flipLang() { LANG = LANG === 'zh' ? 'en' : 'zh'; applyStatic(); if (STATE) buildWall(); }
function copyTxt(btn, id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    const t = btn.textContent; btn.textContent = L().copied; setTimeout(() => { btn.textContent = t; }, 1200);
  });
}

// ---------- 平台适配器（与 CLI 同一套规则）----------
const num = (u, ...ks) => { for (const k of ks) if (u && typeof u[k] === 'number') return u[k]; return 0; };
const textOf = c => typeof c === 'string' ? c.trim()
  : Array.isArray(c) ? c.filter(b => (b.type === 'text' || b.type === 'input_text' || b.type === 'output_text') && b.text).map(b => b.text.trim()).join('\n').trim() : '';
const PARSERS = {
  claude(j, raw) {
    const o = { ts: j.timestamp ? Date.parse(j.timestamp) : NaN, cwd: j.cwd, side: j.isSidechain === true };
    if (j.type === 'summary' || j.isCompactSummary) o.compact = true;
    if (/usage limit|rate limit reached|limit reached|额度|上限已/i.test(raw)) o.limit = true;
    const m = j.message;
    if (m) {
      const u = m.usage;
      if (u) o.usage = { in: num(u, 'input_tokens'), out: num(u, 'output_tokens'), cc: num(u, 'cache_creation_input_tokens'), cr: num(u, 'cache_read_input_tokens') };
      if (m.model && m.model !== '<synthetic>') o.model = m.model;
      const c = m.content;
      if (j.type === 'user') {
        o.typed = textOf(c);
        o.interrupt = typeof c === 'string' ? c.includes('[Request interrupted') : Array.isArray(c) && c.some(b => b.type === 'text' && b.text && b.text.includes('[Request interrupted'));
        o.images = Array.isArray(c) ? c.filter(b => b.type === 'image').length : 0;
      } else if (j.type === 'assistant' && Array.isArray(c)) {
        o.tools = c.filter(b => b.type === 'tool_use').map(b => b.name || '');
        o.aText = c.filter(b => b.type === 'text' && b.text).map(b => b.text).join('\n');
        o.bashCmds = c.filter(b => b.type === 'tool_use' && b.name === 'Bash' && b.input && typeof b.input.command === 'string').map(b => b.input.command);
      }
    }
    return o;
  },
  codex(j) {
    const p = j.payload || {};
    const o = { ts: j.timestamp ? Date.parse(j.timestamp) : NaN };
    if (j.type === 'session_meta') { o.cwd = p.cwd; return o; }
    if (j.type === 'turn_context') { if (p.model) o.model = 'codex/' + p.model; return o; }
    if (j.type === 'event_msg') {
      if (p.type === 'token_count') {
        const u = p.info && p.info.last_token_usage;
        if (u) o.usage = { in: num(u, 'input_tokens'), out: num(u, 'output_tokens'), cc: 0, cr: num(u, 'cached_input_tokens') };
      }
      if (p.type === 'turn_aborted') o.interrupt = true;
      return o;
    }
    if (j.type === 'response_item') {
      if (p.type === 'message' && p.role === 'user') o.typed = textOf(p.content);
      else if (p.type === 'message' && p.role === 'assistant') o.aText = textOf(p.content);
      else if (p.type === 'function_call' || p.type === 'local_shell_call' || p.type === 'custom_tool_call') o.tools = [p.name || 'shell'];
    }
    return o;
  },
  openclaw(j) {
    const o = { ts: j.timestamp ? Date.parse(j.timestamp) : NaN };
    if (j.type === 'session') { o.cwd = j.cwd; return o; }
    if (j.type === 'model_change') { if (j.modelId) o.model = (j.provider || 'openclaw') + '/' + j.modelId; return o; }
    if (j.type === 'message') {
      const m = j.message || {};
      const u = m.usage;
      if (u) o.usage = { in: num(u, 'input_tokens', 'input'), out: num(u, 'output_tokens', 'output'), cc: num(u, 'cache_creation_input_tokens', 'cacheWrite'), cr: num(u, 'cache_read_input_tokens', 'cacheRead') };
      const c = m.content;
      if (m.role === 'user') {
        o.typed = textOf(c);
        o.images = Array.isArray(c) ? c.filter(b => b.type === 'image').length : 0;
      } else if (m.role === 'assistant') {
        if (Array.isArray(c)) {
          o.tools = c.filter(b => b.type === 'toolCall' || b.type === 'tool_use' || b.type === 'tool-call').map(b => b.name || b.toolName || '');
          o.aText = c.filter(b => b.type === 'text' && b.text).map(b => b.text).join('\n');
        } else o.aText = textOf(c);
      }
    }
    return o;
  },
};
const SRC_NAME = { claude: 'Claude Code', codex: 'Codex', openclaw: 'OpenClaw' };
function sniff(firstLine) {
  try {
    const j = JSON.parse(firstLine);
    if (j.type === 'session' && j.version !== undefined) return 'openclaw';
    if (j.payload !== undefined && j.type) return 'codex';
    if (j.type === 'model_change') return 'openclaw';
    return 'claude';
  } catch { return 'claude'; }
}

// ---------- 扫描 ----------
const RIGHT_RE = /you'?re absolutely right|你说得对|你是对的/i;
let STATE = null;
async function processFiles(files) {
  const jsonls = files.filter(f => f.name.endsWith('.jsonl') && !f.name.includes('.trajectory.'));
  const intro = document.getElementById('intro'), prog = document.getElementById('progress');
  if (!jsonls.length) { alert(L().none); return; }
  intro.classList.add('hideme'); prog.classList.remove('hideme');
  const S = {
    sessions: 0, days: new Set(), nightDays: new Set(), dawnDays: new Set(),
    tokens: { in: 0, out: 0, cc: 0, cr: 0 },
    maxSessionTokens: 0, saidRight: 0, taskCalls: 0, toolCalls: 0, mcpCalls: 0,

  const srcOn = Object.values(S.bySrc);
  const total = S.tokens.in + S.tokens.out + S.tokens.cc + S.tokens.cr;
  const join = isFinite(S.firstTs) ? new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(S.firstTs)) : '?';
  const fm = en ? yiEn : yi;
  const sv = [join, S.sessions, S.days.size, fm(total), fm(S.tokens.out), S.toolCalls, S.nightDays.size];
  const card = a => {
    const lock = !a.ok;
    if (lock && a.hidden) return '<div class="card locked hid"><div class="plaque"><span class="ic">❓</span></div><div class="meta"><div class="nm">' + T.hiddenName + '</div><div class="ds">' + T.hiddenDesc + '</div></div></div>';
    const f = (en ? a.fmtEn : a.fmt) || (x => x);
    const pct = Math.min(100, Math.round(a.cur / a.max * 100));
    const hint = pick2(a, 'hint', 'hintEn');
    const prog = lock && a.max > 1
      ? '<div class="pg"><div class="pgb" style="width:' + pct + '%"></div></div><div class="vl">' + f(a.cur) + ' / ' + f(a.max) + (hint ? ' · ' + escH(hint) : '') + '</div>'
      : '<div class="vl">' + (lock ? escH(hint || T.lockedTxt) : escH(pick2(a, 'val', 'valEn'))) + '</div>';
    return '<div class="card ' + (lock ? 'locked' : 'ok') + (a.tier === 't4' ? ' plat' : '') + '" style="--tc:' + TIER_COLOR[a.tier] + '" onclick="pickCard(this)">' +
      '<div class="plaque"><span class="ic">' + (lock ? '🔒' : a.icon) + '</span></div><div class="meta">' +
      '<div class="nm">' + escH(pick2(a, 'name', 'nameEn')) + '<span class="tier">' + T.tiers[a.tier] + '</span>' + (a.hidden ? '<span class="tier hdt">' + T.hiddenTag + '</span>' : '') + '</div>' +
      '<div class="ds">' + escH(pick2(a, 'desc', 'descEn')) + '</div>' + prog + '</div></div>';
  };
  const sections = ['g1', 'g2', 'g3', 'g4'].map(g =>
    '<h2><span>' + T.groups[g] + '</span><span class="gs">' + A.filter(a => a.g === g && a.ok).length + '/' + A.filter(a => a.g === g).length + '</span><span class="rule"></span></h2>' +
    '<div class="grid">' + A.filter(a => a.g === g).map(card).join('') + '</div>').join('');
  const srcParts = srcOn.map(b => '<b>' + escH(b.name) + '</b> ' + b.sessions + ' ' + T.sess).join(' · ');
  document.getElementById('wall').innerHTML =
    '<div class="stats">' + sv.map((v, i) => '<div class="st' + (i >= 4 ? ' hideShare' : '') + '"><b>' + v + '</b><span>' + T.stats[i] + '</span></div>').join('') + '</div>' +
    '<div class="srcs">' + T.srcsLine(srcOn.length, srcParts) + '</div>' +
    '<div class="tip">' + T.tip + '</div>' + sections;
  document.getElementById('wall').classList.remove('hideme');
}

// ---------- 分享（选卡/晒图/导图/复制）----------
function pickCard(el) {
  if (document.body.classList.contains('share') || el.classList.contains('locked')) return;
  el.classList.toggle('pick');
}
function shareSet(cap) {
  const cards = [...document.querySelectorAll('.card.ok')];
  const picked = cards.filter(c => c.classList.contains('pick'));
  const tc = c => getComputedStyle(c).getPropertyValue('--tc').trim();
  let set = picked.length ? picked : [...cards.filter(c => tc(c) === '#7fd4d0'), ...cards.filter(c => tc(c) === '#e8b339')];
  return cap ? set.slice(0, cap) : set;
}
function rowData(c) {
  return { icon: c.querySelector('.ic').textContent, name: c.querySelector('.nm').childNodes[0].textContent,
    tier: c.querySelector('.tier').textContent, val: c.querySelector('.vl').textContent,
    color: getComputedStyle(c).getPropertyValue('--tc').trim() || '#e8b339' };
}
function toggleShare() {
  const b = document.body, cards = [...document.querySelectorAll('.card.ok')];
  if (!b.classList.contains('share')) {
    const show = shareSet(0);
    cards.forEach(c => c.classList.toggle('noshare', !show.includes(c)));
  }
  b.classList.toggle('share');
}
function rr(x, a, b, w, h, r) { x.beginPath(); x.moveTo(a + r, b); x.arcTo(a + w, b, a + w, b + h, r); x.arcTo(a + w, b + h, a, b + h, r); x.arcTo(a, b + h, a, b, r); x.arcTo(a, b, a + w, b, r); x.closePath(); }
function exportPng() {
  if (!STATE) return;
  const T = L(), A = buildA(STATE), unlocked = A.filter(a => a.ok);
  const all = shareSet(0), rows = all.slice(0, 8).map(rowData), extra = all.length - rows.length;
  const W = 1080, Hh = 1350, F = '-apple-system, "PingFang SC", "Noto Sans SC", sans-serif';
  const cv = document.createElement('canvas'); cv.width = W; cv.height = Hh;
  const x = cv.getContext('2d');
  x.fillStyle = '#101216'; x.fillRect(0, 0, W, Hh);
  const g = x.createRadialGradient(180, -80, 0, 180, -80, 950);
  g.addColorStop(0, 'rgba(232,179,57,0.10)'); g.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle = g; x.fillRect(0, 0, W, Hh);
  x.strokeStyle = '#2a2e37'; x.lineWidth = 2; rr(x, 26, 26, W - 52, Hh - 52, 30); x.stroke();
  x.textBaseline = 'middle';
  x.fillStyle = '#e8e6e3'; x.font = '700 50px ' + F; x.fillText('🏆 ' + T.shareHeader, 72, 122);
  x.fillStyle = '#8a8f98'; x.font = '400 27px ' + F; x.fillText(T.unlocked(unlocked.length, A.length), 72, 180);
  const S = STATE, total = S.tokens.in + S.tokens.out + S.tokens.cc + S.tokens.cr;
  const fm = LANG === 'en' ? yiEn : yi;
  const join = isFinite(S.firstTs) ? new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(S.firstTs)) : '?';
  const st4 = [[join, T.stats[0]], [String(S.sessions), T.stats[1]], [String(S.days.size), T.stats[2]], [fm(total), T.stats[3]]];
  let sx = 72;
  st4.forEach(s => {
    x.fillStyle = '#ffd76a'; x.font = '700 40px ' + F; x.fillText(s[0], sx, 264);
    const vw = x.measureText(s[0]).width;
    x.fillStyle = '#8a8f98'; x.font = '400 21px ' + F; x.fillText(s[1], sx, 304);
    sx += Math.max(vw, x.measureText(s[1]).width) + 52;
  });
  let y = 402;
  rows.forEach(r => {
    x.fillStyle = '#1c1f26'; rr(x, 72, y - 46, W - 144, 92, 18); x.fill();
    x.strokeStyle = r.color; x.lineWidth = 1.5; rr(x, 72, y - 46, W - 144, 92, 18); x.stroke();
    x.fillStyle = r.color; rr(x, 72, y - 46, 7, 92, 3); x.fill();
    x.font = '40px ' + F; x.fillText(r.icon, 102, y + 2);
    x.fillStyle = '#e8e6e3'; x.font = '700 31px ' + F; x.fillText(r.name, 172, y - 15);
    const nw = x.measureText(r.name).width;
    x.fillStyle = r.color; x.font = '400 21px ' + F; x.fillText(r.tier, 172 + nw + 16, y - 13);
    x.fillStyle = '#ffd76a'; x.font = '400 25px ' + F; x.fillText(r.val, 172, y + 26);
    y += 104;
  });
  if (extra > 0) { x.fillStyle = '#6b7280'; x.font = '400 25px ' + F; x.fillText(T.moreTxt.replace('{n}', extra), 84, y); }
  x.fillStyle = '#8a8f98'; x.font = '400 23px ' + F; x.fillText('🏆 vibe-trophy · onlycarbon.github.io/vibe-trophy', 72, Hh - 82);
  cv.toBlob(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'vibe-trophy.png'; a.click(); });
}
function copyStats() {
  if (!STATE) return;
  const T = L(), A = buildA(STATE), unlocked = A.filter(a => a.ok);
  const head = LANG === 'en'
    ? '🏆 ' + T.shareHeader + ' — ' + T.unlocked(unlocked.length, A.length) + ' (' + T.fromLogs + ')'
    : '🏆 ' + T.shareHeader + ' ' + T.unlocked(unlocked.length, A.length) + '（' + T.fromLogs + '）';
  const lines = [head];
  shareSet(6).map(rowData).forEach(r => lines.push(r.icon + ' ' + r.name + T.sep + r.val));
  lines.push('👉 https://onlycarbon.github.io/vibe-trophy/');
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const b = document.getElementById('copyBtn'), t = b.textContent;
    b.textContent = T.copied; setTimeout(() => { b.textContent = t; }, 1500);
  });
}

// ---------- 文件接入 ----------
document.getElementById('picker').addEventListener('change', e => processFiles([...e.target.files]));
const drop = document.getElementById('drop');
['dragover', 'dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', async e => {
  e.preventDefault();
  const items = [...e.dataTransfer.items];
  const files = [];
  async function walkEntry(entry) {
    if (!entry) return;
    if (entry.isFile) {
      if (entry.name.endsWith('.jsonl')) await new Promise(res => entry.file(f => { files.push(f); res(); }, res));
    } else if (entry.isDirectory) {
      const reader = entry.createReader();
      let batch;
      do {
        batch = await new Promise(res => reader.readEntries(res, () => res([])));
        for (const en2 of batch) await walkEntry(en2);
      } while (batch.length);
    }
  }
  for (const it of items) {
    const entry = it.webkitGetAsEntry && it.webkitGetAsEntry();
    if (entry) await walkEntry(entry);
    else { const f = it.getAsFile && it.getAsFile(); if (f && f.name.endsWith('.jsonl')) files.push(f); }
  }
  processFiles(files);
});
applyStatic();
